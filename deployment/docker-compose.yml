services:
  postgres:
    image: postgres:16-alpine
    container_name: predictfi-postgres
    environment:
      POSTGRES_USER: predictfi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: predictfi
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U predictfi']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: predictfi-redis
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    container_name: predictfi-api
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql://predictfi:${POSTGRES_PASSWORD:-password}@postgres:5432/predictfi
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379
      API_PORT: '4000'
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_STELLAR_NETWORK: ${NEXT_PUBLIC_STELLAR_NETWORK:-testnet}
        NEXT_PUBLIC_STELLAR_RPC_URL: ${NEXT_PUBLIC_STELLAR_RPC_URL:-}
        NEXT_PUBLIC_MARKET_FACTORY_CONTRACT: ${NEXT_PUBLIC_MARKET_FACTORY_CONTRACT}
        NEXT_PUBLIC_POSITION_VAULT_CONTRACT: ${NEXT_PUBLIC_POSITION_VAULT_CONTRACT}
        NEXT_PUBLIC_SETTLEMENT_CONTRACT: ${NEXT_PUBLIC_SETTLEMENT_CONTRACT}
        NEXT_PUBLIC_REPUTATION_CONTRACT: ${NEXT_PUBLIC_REPUTATION_CONTRACT}
        NEXT_PUBLIC_REGISTRY_CONTRACT: ${NEXT_PUBLIC_REGISTRY_CONTRACT}
    container_name: predictfi-web
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
